version: '3.8'

services:
  actual:
    image: 'actualbudget/actual-server:latest'
    container_name: actual
    environment:
      - ACTUAL_LOGIN_METHOD=password
    volumes:
      - 'actual_data:/data'
    healthcheck:
      test:
        - CMD-SHELL
        - "bash -c ':> /dev/tcp/127.0.0.1/5006' || exit 1"
      interval: 5s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - default

  actual-telegram-notif:
    # Option A: Utiliser l'image publiée sur Docker Hub
    # Remplace 'gabmatulee' par ton username Docker Hub
    image: gabmatulee/actual-telegram-notif:latest
    
    # Option B: Builder localement depuis le Dockerfile
    # Décommente les 2 lignes ci-dessous et commente la ligne 'image:' au-dessus
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: actual-telegram-notif

    # Variables d'environnement
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_USER_ID: ${TELEGRAM_USER_ID}
      ACTUAL_SERVER_URL: ${ACTUAL_SERVER_URL}
      ACTUAL_SERVER_PASSWORD: ${ACTUAL_SERVER_PASSWORD}
      BUDGET_ID: ${BUDGET_ID}
      NODE_ENV: production

    depends_on:
      actual:
        condition: service_healthy

    # Relancer automatiquement si le container crash
    restart: unless-stopped

    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Volumes pour persister l'état des notifications
    volumes:
      - notifier_state:/tmp/actual-telegram-notif

    # Optionnel: Network si tu as d'autres services
    networks:
      - default

volumes:
  actual_data:
    driver: local
  notifier_state:
    driver: local

networks:
  default:
    driver: bridge
